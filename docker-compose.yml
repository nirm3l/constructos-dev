name: constructos-app

x-codex-config-volume: &codex_config_volume "${CODEX_CONFIG_FILE}:/home/app/.codex/config.toml:ro"
x-codex-auth-volume: &codex_auth_volume "${CODEX_AUTH_FILE}:/home/app/.codex/auth.json:ro"
x-codex-home-volume: &codex_home_volume "codex-home-data:/home/app/codex-home"
x-codex-workspace-volume: &codex_workspace_volume "${AGENT_CODEX_WORKSPACE_MOUNT:-./data/workspace}:/home/app/workspace"
x-agent-common-extra-hosts: &agent_common_extra_hosts
  - "gateway:host-gateway"

x-agent-common-fixed-env: &agent_common_fixed_env
  EVENTSTORE_URI: "esdb://kurrentdb:2113?tls=false"
  AGENT_CODEX_COMMAND: "python -m features.agents.codex_mcp_adapter"
  AGENT_DOCKER_PROXY_URL: "tcp://docker-socket-proxy:2375"
  DOCKER_BUILDKIT: "0"
  COMPOSE_DOCKER_CLI_BUILD: "0"
  AGENT_DOCKER_SOFT_ISOLATION: "true"
  AGENT_DOCKER_ALLOWED_PROJECT_PREFIX: "constructos-ws-"
  MCP_ALLOWED_WORKSPACE_IDS: "10000000-0000-0000-0000-000000000001"
  KNOWLEDGE_GRAPH_ENABLED: "true"
  GRAPH_RAG_ENABLED: "true"
  VECTOR_STORE_ENABLED: "true"
  CONTEXT_PACK_EVIDENCE_TOP_K: "12"
  EMBEDDING_PROVIDER: "ollama"

x-agent-common-config-env: &agent_common_config_env
  DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://m4tr1x:m4tr1x@postgres:5432/task_management}"
  APP_VERSION: "${APP_VERSION:-dev}"
  APP_BUILD: "${APP_BUILD:-}"
  APP_DEPLOYED_AT_UTC: "${APP_DEPLOYED_AT_UTC:-}"
  AGENT_CHAT_CONTEXT_LIMIT_TOKENS: "400000"
  AGENT_CODEX_HOME_ROOT: "/home/app/codex-home"
  AGENT_CODEX_WORKDIR: "/home/app/workspace"
  AGENT_CODEX_MODEL: "${AGENT_CODEX_MODEL:-}"
  AGENT_CODEX_REASONING_EFFORT: "${AGENT_CODEX_REASONING_EFFORT:-}"
  AGENT_ENABLED_PLUGINS: "${AGENT_ENABLED_PLUGINS:-team_mode,git_delivery,github_delivery}"
  EVENT_STORMING_CODEX_REASONING_EFFORT: "low"
  MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN:-dev-mcp-token}"
  GITHUB_PAT: "${GITHUB_PAT:-}"
  AGENT_DOCKER_PROJECT_NAME: "${AGENT_DOCKER_PROJECT_NAME:-constructos-ws-default}"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "task-management-neo4j"
  NEO4J_DATABASE: "neo4j"
  OLLAMA_BASE_URL: "http://ollama:11434"
  DEFAULT_EMBEDDING_MODEL: "nomic-embed-text"
  ALLOWED_EMBEDDING_MODELS: "nomic-embed-text,mxbai-embed-large,embeddinggemma"
  OLLAMA_EMBED_GPU_ENABLED: "true"
  LICENSE_SERVER_TOKEN: "${LICENSE_SERVER_TOKEN:-dev-license-token}"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: "task_management"
      POSTGRES_USER: "m4tr1x"
      POSTGRES_PASSWORD: "m4tr1x"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-m4tr1x} -d ${POSTGRES_DB:-task_management}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  kurrentdb:
    image: docker.kurrent.io/kurrent-latest/kurrentdb:latest
    container_name: kurrentdb
    environment:
      KURRENTDB_CLUSTER_SIZE: 1
      KURRENTDB_RUN_PROJECTIONS: All
      KURRENTDB_START_STANDARD_PROJECTIONS: "true"
      KURRENTDB_INSECURE: "true"
      KURRENTDB_ENABLE_ATOM_PUB_OVER_HTTP: "true"
    ports:
      - "2113:2113"
    volumes:
      - kurrent-data:/var/lib/kurrentdb
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    environment:
      NEO4J_AUTH: "neo4j/task-management-neo4j"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.16.2
    container_name: ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "2"
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ${OLLAMA_MODELS_MOUNT:-ollama-data}:/root/.ollama
    restart: unless-stopped

  task-app:
    image: "${TASK_APP_IMAGE:-task-management-task-app:local}"
    build: ./app
    container_name: task-app
    depends_on:
      - postgres
      - kurrentdb
      - neo4j
      - mcp-tools
    environment:
      <<: [*agent_common_fixed_env, *agent_common_config_env]
      AGENT_RUNNER_ENABLED: "true"
      AGENT_RUNNER_MAX_CONCURRENCY: "3"
      AGENT_RUNNER_APPLY_OUTCOME_MUTATIONS: "true"
      AGENT_CODEX_MCP_URL: "http://mcp-tools:8091/mcp"
      EVENT_STORMING_ANALYSIS_WORKER_ENABLED: "true"
    volumes:
      - *codex_config_volume
      - *codex_auth_volume
      - *codex_home_volume
      - *codex_workspace_volume
    extra_hosts: *agent_common_extra_hosts
    ports:
      - "1102:8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  mcp-tools:
    image: "${MCP_TOOLS_IMAGE:-task-management-mcp-tools:local}"
    build: ./app
    container_name: mcp-tools
    depends_on:
      - postgres
      - kurrentdb
      - neo4j
    command: ["python", "-m", "features.agents.mcp_server"]
    environment:
      <<: [*agent_common_fixed_env, *agent_common_config_env]
    ports:
      - "8091:8091"
    volumes:
      - *codex_config_volume
      - *codex_auth_volume
      - *codex_home_volume
      - *codex_workspace_volume
    extra_hosts: *agent_common_extra_hosts
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-socket-proxy
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      VERSION: 1
      EVENTS: 1
      POST: 1
      DELETE: 1
      BUILD: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  marketing-site:
    image: "${MARKETING_SITE_IMAGE:-task-management-marketing-site:local}"
    build: ./marketing-site
    container_name: marketing-site
    ports:
      - "${MARKETING_PORT:-8082}:80"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  postgres-data:
    name: task-management_postgres-data
  kurrent-data:
    name: task-management_kurrent-data
  neo4j-data:
    name: task-management_neo4j-data
  ollama-data:
    name: task-management_ollama-data
  codex-home-data:
    name: task-management_codex-home-data
