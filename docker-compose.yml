services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: m4tr1x
      POSTGRES_PASSWORD: m4tr1x
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m4tr1x -d task_management"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  kurrentdb:
    image: eventstore/eventstore:24.10.0-jammy
    container_name: kurrentdb
    environment:
      EVENTSTORE_CLUSTER_SIZE: 1
      EVENTSTORE_RUN_PROJECTIONS: All
      EVENTSTORE_START_STANDARD_PROJECTIONS: "true"
      EVENTSTORE_INSECURE: "true"
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
      EVENTSTORE_EXT_IP: 0.0.0.0
      EVENTSTORE_INT_IP: 0.0.0.0
    ports:
      - "2113:2113"
    volumes:
      - kurrent-data:/var/lib/eventstore
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/task-management-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  task-app:
    build: ./app
    container_name: task-app
    depends_on:
      - postgres
      - kurrentdb
      - neo4j
      - mcp-tools
    environment:
      DATABASE_URL: postgresql+psycopg://m4tr1x:m4tr1x@postgres:5432/task_management
      EVENTSTORE_URI: esdb://kurrentdb:2113?tls=false
      APP_VERSION: "${APP_VERSION:-dev}"
      APP_BUILD: "${APP_BUILD:-}"
      APP_DEPLOYED_AT_UTC: "${APP_DEPLOYED_AT_UTC:-}"
      AGENT_RUNNER_ENABLED: "true"
      AGENT_RUNNER_INTERVAL_SECONDS: "3"
      AGENT_RUNNER_APPLY_OUTCOME_MUTATIONS: "true"
      AGENT_EXECUTOR_MODE: "command"
      AGENT_EXECUTOR_TIMEOUT_SECONDS: "180"
      AGENT_CODEX_COMMAND: "python -m features.agents.codex_mcp_adapter"
      AGENT_CODEX_MCP_URL: "http://mcp-tools:8090/mcp"
      MCP_AUTH_TOKEN: "dev-mcp-token"
      MCP_ALLOWED_WORKSPACE_IDS: "10000000-0000-0000-0000-000000000001"
      KNOWLEDGE_GRAPH_ENABLED: "true"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "task-management-neo4j"
      NEO4J_DATABASE: "neo4j"
    volumes:
      - /home/m4tr1x/.codex/auth.json:/root/.codex/auth.json:ro
    ports:
      - "8080:8000"
    restart: unless-stopped

  mcp-tools:
    build: ./app
    container_name: mcp-tools
    depends_on:
      - postgres
      - kurrentdb
      - neo4j
    command: ["python", "-m", "features.agents.mcp_server"]
    environment:
      DATABASE_URL: postgresql+psycopg://m4tr1x:m4tr1x@postgres:5432/task_management
      EVENTSTORE_URI: esdb://kurrentdb:2113?tls=false
      APP_VERSION: "${APP_VERSION:-dev}"
      APP_BUILD: "${APP_BUILD:-}"
      APP_DEPLOYED_AT_UTC: "${APP_DEPLOYED_AT_UTC:-}"
      MCP_SERVER_TRANSPORT: streamable-http
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: "8090"
      MCP_SERVER_PATH: /mcp
      MCP_SERVER_STATELESS_HTTP: "true"
      AGENT_EXECUTOR_TIMEOUT_SECONDS: "180"
      MCP_AUTH_TOKEN: "dev-mcp-token"
      MCP_TOOL_AUTH_TOKEN: "dev-mcp-token"
      MCP_ACTOR_USER_ID: "00000000-0000-0000-0000-000000000099"
      MCP_DEFAULT_WORKSPACE_ID: "10000000-0000-0000-0000-000000000001"
      MCP_ALLOWED_WORKSPACE_IDS: "10000000-0000-0000-0000-000000000001"
      MCP_EMAIL_SMTP_HOST: "${MCP_EMAIL_SMTP_HOST:-}"
      MCP_EMAIL_SMTP_PORT: "${MCP_EMAIL_SMTP_PORT:-587}"
      MCP_EMAIL_SMTP_USERNAME: "${MCP_EMAIL_SMTP_USERNAME:-}"
      MCP_EMAIL_SMTP_PASSWORD: "${MCP_EMAIL_SMTP_PASSWORD:-}"
      MCP_EMAIL_SMTP_STARTTLS: "${MCP_EMAIL_SMTP_STARTTLS:-true}"
      MCP_EMAIL_SMTP_SSL: "${MCP_EMAIL_SMTP_SSL:-false}"
      MCP_EMAIL_FROM: "${MCP_EMAIL_FROM:-}"
      MCP_EMAIL_ALLOWED_RECIPIENTS: "${MCP_EMAIL_ALLOWED_RECIPIENTS:-}"
      MCP_EMAIL_ALLOWED_DOMAINS: "${MCP_EMAIL_ALLOWED_DOMAINS:-}"
      KNOWLEDGE_GRAPH_ENABLED: "true"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "task-management-neo4j"
      NEO4J_DATABASE: "neo4j"
    ports:
      - "8091:8090"
    restart: unless-stopped

volumes:
  postgres-data:
  kurrent-data:
  neo4j-data:
