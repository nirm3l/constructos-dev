<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Flow</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --surface-soft: #eef3ff;
      --text: #122032;
      --muted: #58657a;
      --accent: #1f6feb;
      --accent-strong: #1147a8;
      --danger: #ba1a1a;
      --line: #c7d0df;
      --shadow-1: 0 6px 16px rgba(14, 29, 54, 0.08);
      --shadow-2: 0 14px 28px rgba(14, 29, 54, 0.14);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-pill: 999px;
      --icon-size: 20px;
      --icon-stroke: 2;
    }
    [data-theme="dark"] {
      --bg: #0f151d;
      --panel: #17202b;
      --surface-soft: #1c2835;
      --text: #e8eef8;
      --muted: #afbccf;
      --accent: #8ab4ff;
      --accent-strong: #5f8ee6;
      --danger: #ff8f8f;
      --line: #2f3b4b;
      --shadow-1: 0 8px 20px rgba(0, 0, 0, 0.32);
      --shadow-2: 0 16px 30px rgba(0, 0, 0, 0.4);
    }
    [data-contrast="high"] {
      --line: color-mix(in srgb, var(--text), #000 15%);
      --muted: color-mix(in srgb, var(--text), #fff 20%);
      --icon-stroke: 2.4;
      --shadow-1: 0 0 0 1px color-mix(in srgb, var(--text), transparent 65%);
      --shadow-2: 0 0 0 2px color-mix(in srgb, var(--text), transparent 55%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Trebuchet MS", "Gill Sans", sans-serif;
      letter-spacing: 0.01em;
      background:
        radial-gradient(circle at 8% 8%, rgba(0,106,106,0.16), transparent 28%),
        radial-gradient(circle at 90% 22%, rgba(88,101,122,0.16), transparent 26%),
        radial-gradient(circle at 85% 90%, rgba(0,106,106,0.1), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .app { max-width: 920px; margin: 0 auto; min-height: 100vh; padding-bottom: 98px; }
    header {
      position: sticky; top: 0; z-index: 20;
      background: color-mix(in srgb, var(--bg), transparent 10%);
      backdrop-filter: blur(14px);
      padding: 14px 14px 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--line), transparent 26%);
    }
    #title { font-size: 21px; letter-spacing: 0.015em; }
    .row { display: flex; gap: 10px; align-items: center; }
    .grow { flex: 1; }
    input, select, textarea, button {
      font: inherit;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 44px;
      padding: 10px 12px;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .18s ease;
    }
    input:focus, select:focus, textarea:focus, button:focus {
      outline: none;
      border-color: color-mix(in srgb, var(--accent), white 24%);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent), transparent 78%);
    }
    button { cursor: pointer; }
    .btn-accent {
      background: linear-gradient(160deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: transparent;
      box-shadow: var(--shadow-1);
    }
    .btn-accent:hover { transform: translateY(-1px); box-shadow: var(--shadow-2); }
    .container { padding: 14px; }
    .hidden { display: none !important; }
    .card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel), white 22%), var(--panel));
      border: 1px solid color-mix(in srgb, var(--line), transparent 10%);
      border-radius: var(--radius-lg);
      padding: 12px;
      box-shadow: var(--shadow-1);
      margin-bottom: 10px;
      animation: rise .24s ease both;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-2);
    }
    .task-title { font-weight: 700; }
    .meta { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-flex; align-items: center; padding: 4px 8px;
      border: 1px solid color-mix(in srgb, var(--line), transparent 12%);
      border-radius: var(--radius-pill);
      font-size: 12px;
      margin-right: 5px;
      background: color-mix(in srgb, var(--surface-soft), transparent 6%);
    }
    .tabs {
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      background: color-mix(in srgb, var(--panel), transparent 4%);
      border: 1px solid color-mix(in srgb, var(--line), transparent 18%);
      border-radius: var(--radius-lg);
      display: grid;
      grid-template-columns: repeat(5,1fr);
      z-index: 30;
      box-shadow: var(--shadow-2);
      backdrop-filter: blur(14px);
    }
    .tab.active {
      color: var(--accent);
      font-weight: 700;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent), transparent 86%), transparent);
      border-radius: var(--radius-md);
    }
    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(90px + env(safe-area-inset-bottom));
      z-index: 40;
      border-radius: var(--radius-pill);
      width: 64px;
      height: 64px;
      background: linear-gradient(165deg, var(--accent), var(--accent-strong));
      color: #fff;
      border: 3px solid color-mix(in srgb, var(--panel), #fff 55%);
      box-shadow: 0 12px 26px color-mix(in srgb, var(--accent), transparent 62%), var(--shadow-2);
    }
    .fab:hover { transform: translateY(-2px) scale(1.02); }
    .fab:active { transform: scale(0.98); }
    .fab .ic {
      width: 30px;
      height: 30px;
      stroke-width: 3;
    }
    .drawer {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, #020711, transparent 58%);
      z-index: 50;
      display: none;
      align-items: end;
    }
    .drawer.open { display: flex; }
    .drawer-body {
      width: 100%;
      max-height: 88vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid color-mix(in srgb, var(--line), transparent 18%);
      border-radius: 30px 30px 0 0;
      padding: 16px 14px 12px;
      box-shadow: var(--shadow-2);
    }
    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: color-mix(in srgb, var(--panel), transparent 3%);
      border-top: 1px solid var(--line);
      padding: 10px 0;
      display: flex;
      gap: 8px;
    }
    .kanban-tabs {
      position: sticky;
      top: 0;
      z-index: 8;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 10px;
      background: color-mix(in srgb, var(--bg), transparent 8%);
    }
    .kanban-tab-btn {
      min-height: 36px;
      border-radius: var(--radius-pill);
      padding: 6px 12px;
      white-space: nowrap;
      border: 1px solid color-mix(in srgb, var(--line), transparent 12%);
      background: color-mix(in srgb, var(--surface-soft), transparent 2%);
      color: var(--muted);
      font-weight: 600;
    }
    .kanban-tab-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(165deg, var(--accent), var(--accent-strong));
      box-shadow: var(--shadow-1);
    }
    .kanban-pager {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .kanban-pager::-webkit-scrollbar { display: none; }
    .lane {
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface-soft), transparent 10%), var(--panel));
      border: 1px solid color-mix(in srgb, var(--line), transparent 14%);
      border-radius: var(--radius-lg);
      padding: 10px;
      min-height: 220px;
      box-shadow: inset 0 1px 0 color-mix(in srgb, white, transparent 72%);
    }
    .lane-page {
      flex: 0 0 calc(100% - 4px);
      max-width: calc(100% - 4px);
      scroll-snap-align: start;
    }
    .lane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .lane-count {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid color-mix(in srgb, var(--line), transparent 16%);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--surface-soft), transparent 6%);
    }
    .kanban-card {
      margin-bottom: 10px;
    }
    .kanban-card .row {
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .kanban-card .task-title {
      line-height: 1.25;
    }
    .kanban-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .swipe {
      display: grid; grid-template-columns: 1fr auto; gap: 8px;
    }
    .actions button { min-height: 40px; margin-left: 6px; }
    .icon-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--surface-soft), transparent 4%);
      border-color: color-mix(in srgb, var(--line), transparent 6%);
    }
    .btn-accent.icon-btn {
      background: linear-gradient(160deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: transparent;
      box-shadow: var(--shadow-1);
    }
    .ic {
      width: var(--icon-size);
      height: var(--icon-size);
      display: inline-block;
      stroke: currentColor;
      fill: none;
      stroke-width: var(--icon-stroke);
      stroke-linecap: round;
      stroke-linejoin: round;
      vertical-align: middle;
    }
    .tab-icon .ic {
      width: calc(var(--icon-size) - 2px);
      height: calc(var(--icon-size) - 2px);
    }
    .icon-btn:hover { transform: translateY(-1px); background: color-mix(in srgb, var(--accent), var(--surface-soft) 80%); }
    .btn-accent.icon-btn:hover { background: linear-gradient(160deg, color-mix(in srgb, var(--accent), white 10%), var(--accent-strong)); }
    .notif-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      padding: 0 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: #d1242f;
      border: 2px solid var(--panel);
      line-height: 1;
    }
    .icon-btn[disabled] { opacity: .45; cursor: not-allowed; transform: none; }
    .tab {
      min-height: 58px; border: 0; background: transparent; color: var(--muted); border-radius: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      margin: 4px;
    }
    .tab-icon { font-size: 18px; line-height: 1; }
    .tab-label { font-size: 11px; }
    @keyframes rise {
      from { opacity: .55; transform: translateY(6px) scale(.995); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 760px) {
      .lane-page {
        flex: 0 0 calc(100% - 4px);
        max-width: calc(100% - 4px);
      }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="row">
      <strong id="title">Inbox</strong>
      <span class="grow"></span>
      <button id="notifBtn" class="icon-btn" title="Notifications" aria-label="Notifications">
        <svg class="ic" viewBox="0 0 24 24"><path d="M15 17h5l-1.4-1.4a2 2 0 0 1-.6-1.4V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/><path d="M10 17a2 2 0 0 0 4 0"/></svg>
        <span id="notifBadge" class="notif-badge hidden">0</span>
      </button>
    </div>
    <div class="row" style="margin-top: 8px;">
      <input class="grow" id="quickAdd" placeholder="Quick add task..." />
      <button class="btn-accent icon-btn" id="quickAddBtn" title="Add task" aria-label="Add task">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section id="view-inbox"></section>
    <section id="view-today" class="hidden"></section>
    <section id="view-projects" class="hidden"></section>
    <section id="view-search" class="hidden"></section>
    <section id="view-profile" class="hidden"></section>
  </main>
</div>

<button class="fab" id="fab" aria-label="New task">
  <svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<nav class="tabs">
  <button class="tab active" data-tab="inbox"><span class="tab-icon"><svg class="ic" viewBox="0 0 24 24"><path d="M4 13h4l2 3h4l2-3h4"/><path d="M4 13V6h16v7"/><path d="M4 13v5h16v-5"/></svg></span><span class="tab-label">Inbox</span></button>
  <button class="tab" data-tab="today"><span class="tab-icon"><svg class="ic" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg></span><span class="tab-label">Today</span></button>
  <button class="tab" data-tab="projects"><span class="tab-icon"><svg class="ic" viewBox="0 0 24 24"><path d="M3 7h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7V5a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2"/></svg></span><span class="tab-label">Projects</span></button>
  <button class="tab" data-tab="search"><span class="tab-icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></span><span class="tab-label">Search</span></button>
  <button class="tab" data-tab="profile"><span class="tab-icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg></span><span class="tab-label">Profile</span></button>
</nav>

<div class="drawer" id="drawer">
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
  const VALID_TABS = ['inbox', 'today', 'projects', 'search', 'profile'];

  const state = {
    data: null,
    currentUserId: '',
    currentTab: 'inbox',
    tasks: [],
    selectedTask: null,
    selectedProjectId: null,
    activeKanbanStatus: null,
    moveTaskId: null,
    moveStatuses: [],
    page: 0,
    pageSize: 30,
    search: { q: '', status: '', priority: '' },
    projectView: 'list',
    contrast: 'normal'
  };
  let searchDebounceId = null;
  let notificationSource = null;

  function cacheSet(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }
  function cacheGet(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
  }
  state.tasks = cacheGet('tasks_cache', []);
  state.currentTab = cacheGet('ui_current_tab', 'inbox');
  state.currentUserId = String(cacheGet('ui_user_id', '') || '');
  if (!VALID_TABS.includes(state.currentTab)) state.currentTab = 'inbox';
  const cachedTheme = cacheGet('ui_theme', null);
  if (cachedTheme === 'light' || cachedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', cachedTheme);
  }
  const cachedContrast = cacheGet('ui_contrast', 'normal');
  state.contrast = cachedContrast === 'high' ? 'high' : 'normal';
  document.documentElement.setAttribute('data-contrast', state.contrast);

  async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json', 'X-User-Id': String(state.currentUserId || '') } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(await res.text());
    const ct = res.headers.get('content-type') || '';
    return ct.includes('application/json') ? res.json() : res.text();
  }

  function getUserTz() {
    return state.data?.current_user?.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
  }

  function dateKeyInTz(dt, tz) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: tz,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(dt);
    const y = parts.find(p => p.type === 'year')?.value || '0000';
    const m = parts.find(p => p.type === 'month')?.value || '00';
    const d = parts.find(p => p.type === 'day')?.value || '00';
    return `${y}-${m}-${d}`;
  }

  function fmtDue(v) {
    if (!v) return 'No due date';
    return new Intl.DateTimeFormat(undefined, {
      dateStyle: 'medium',
      timeStyle: 'short',
      timeZone: getUserTz()
    }).format(new Date(v));
  }

  function toLocalInputValue(v) {
    if (!v) return '';
    const d = new Date(v);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${y}-${m}-${day}T${hh}:${mm}`;
  }

  function getProjectName(projectId) {
    if (!projectId) return 'Inbox';
    const project = state.data?.projects?.find(p => p.id === projectId);
    return project ? project.name : `Project #${projectId}`;
  }

  function renderTaskCard(task) {
    const labels = (task.labels || []).map(l => `<span class="pill">#${l}</span>`).join('');
    const doneOrArchived = task.status === 'Done' || task.archived;
    return `
      <article class="card swipe" draggable="true" data-task-id="${task.id}">
        <div onclick="openTask('${task.id}')">
          <div class="task-title">${task.title}</div>
          <div class="meta">${task.status} | ${task.priority} | ${fmtDue(task.due_date)} | ${getProjectName(task.project_id)}</div>
          <div style="margin-top:6px">${labels}</div>
        </div>
        <div class="actions">
          <button class="icon-btn" type="button" title="Complete" aria-label="Complete task" ${doneOrArchived ? 'disabled' : ''} onclick="completeTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg></button>
          <button class="icon-btn" type="button" title="Reopen" aria-label="Reopen task" ${task.status === 'Done' && !task.archived ? '' : 'disabled'} onclick="reopenTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg></button>
          <button class="icon-btn" type="button" title="Archive" aria-label="Archive task" ${task.archived ? 'disabled' : ''} onclick="archiveTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 8h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M3 4h18v4H3z"/><path d="M10 12h4"/></svg></button>
        </div>
      </article>
    `;
  }

  function renderBoardTaskCard(task) {
    const labels = (task.labels || []).slice(0, 2).map(l => `<span class="pill">#${l}</span>`).join('');
    const doneOrArchived = task.status === 'Done' || task.archived;
    return `
      <article class="card kanban-card" onclick="openTask('${task.id}')">
        <div class="row">
          <div class="task-title grow">${task.title}</div>
          <button class="icon-btn" type="button" title="Move task" aria-label="Move task" onclick="openMoveSheet(event, '${task.id}', '${task.status.replace(/'/g, "\\'")}')"><svg class="ic" viewBox="0 0 24 24"><path d="m9 7-4 5 4 5"/><path d="m15 7 4 5-4 5"/><path d="M5 12h14"/></svg></button>
        </div>
        <div class="meta">${task.priority} | ${fmtDue(task.due_date)} | ${getProjectName(task.project_id)}</div>
        <div style="margin-top:6px">${labels}</div>
        <div class="kanban-actions">
          <button class="icon-btn" type="button" title="Complete" aria-label="Complete task" ${doneOrArchived ? 'disabled' : ''} onclick="completeTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg></button>
          <button class="icon-btn" type="button" title="Reopen" aria-label="Reopen task" ${task.status === 'Done' && !task.archived ? '' : 'disabled'} onclick="reopenTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg></button>
          <button class="icon-btn" type="button" title="Archive" aria-label="Archive task" ${task.archived ? 'disabled' : ''} onclick="archiveTask(event, '${task.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 8h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M3 4h18v4H3z"/><path d="M10 12h4"/></svg></button>
        </div>
      </article>
    `;
  }

  function renderInbox() {
    const el = document.getElementById('view-inbox');
    const items = state.tasks.filter(t => !t.archived && !t.project_id);
    el.innerHTML = `<h3>Inbox</h3>${items.map(renderTaskCard).join('') || '<p class="meta">Inbox is empty.</p>'}`;
  }

  function renderToday() {
    const el = document.getElementById('view-today');
    const tz = getUserTz();
    const now = new Date();
    const todayKey = dateKeyInTz(now, tz);
    const today = state.tasks.filter(t => {
      if (!t.due_date || t.status === 'Done') return false;
      return dateKeyInTz(new Date(t.due_date), tz) === todayKey;
    });
    const overdue = state.tasks.filter(t => t.due_date && new Date(t.due_date) < now && t.status !== 'Done');
    el.innerHTML = `
      <h3>Today (${tz})</h3>
      ${today.map(renderTaskCard).join('') || '<p class="meta">No tasks due today.</p>'}
      <h3>Overdue</h3>
      ${overdue.map(renderTaskCard).join('') || '<p class="meta">Nema overdue taskova.</p>'}
    `;
  }

  async function renderProjects() {
    const el = document.getElementById('view-projects');
    const createBox = `
      <div class="card">
        <h3>Novi projekat</h3>
        <div class="row">
          <input id="newProjectName" class="grow" placeholder="Naziv projekta" />

    if (!state.selectedProjectId && state.data.projects.length) {
      state.selectedProjectId = state.data.projects[0].id;
    }
    const project = state.data.projects.find(p => p.id === state.selectedProjectId) || state.data.projects[0];
    if (!project) {
      el.innerHTML = `${createBox}<p class="meta">Nema projekata.</p>`;
      return;
    }
    const projectPicker = `
      <div class="card">
        <div class="row">
          <select class="grow" onchange="selectProject(this.value)">

            ? '<svg class="ic" viewBox="0 0 24 24"><path d="M4 5h7v6H4zM13 5h7v4h-7zM13 11h7v8h-7zM4 13h7v6H4z"/></svg>'
            : '<svg class="ic" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>'}</button>
          <button class="icon-btn" title="Delete project" aria-label="Delete project" onclick="deleteSelectedProject()"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><path d="M10 10v7M14 10v7"/></svg></button>
        </div>
      </div>
    `;
    const toggle = `<div class="row"><h3 class="grow">${project.name}</h3></div>`;

    if (state.projectView === 'list') {
      const items = state.tasks.filter(t => t.project_id === project.id && !t.archived);
      el.innerHTML = `${createBox}${projectPicker}${toggle}${items.map(renderTaskCard).join('') || '<p class="meta">Prazno.</p>'}`;
      return;
    }

    const board = await api(`/api/projects/${project.id}/board`);
    if (!state.activeKanbanStatus || !board.statuses.includes(state.activeKanbanStatus)) {
      state.activeKanbanStatus = board.statuses[0] || null;
    }

    const statusTabs = `
      <div class="kanban-tabs">
        ${board.statuses.map(s => `<button class="kanban-tab-btn ${s === state.activeKanbanStatus ? 'active' : ''}" data-status="${s}" onclick="setKanbanStatus('${s.replace(/'/g, "\\'")}')">${s} (${(board.lanes[s] || []).length})</button>`).join('')}

        <div id="searchResults"></div>

      document.getElementById('searchInput').addEventListener('input', e => setSearch('q', e.target.value));

      document.getElementById('searchPriority').addEventListener('change', e => setSearch('priority', e.target.value));
    }

      const byP = !state.search.priority || t.priority === state.search.priority;

  function updateNotificationBadge() {
    const badge = document.getElementById('notifBadge');
    if (!badge || !state.data) return;
    const unread = (state.data.notifications || []).filter(n => !n.is_read).length;
    badge.textContent = unread > 99 ? '99+' : String(unread);
    badge.classList.toggle('hidden', unread <= 0);
  }

  function connectNotificationStream() {
    if (!state.currentUserId) return;
    if (notificationSource) {
      notificationSource.close();
      notificationSource = null;
    }
    const lastId = state.data?.notifications?.[0]?.id || '';
    notificationSource = new EventSource(`/api/notifications/stream?user_id=${encodeURIComponent(state.currentUserId)}&last_id=${encodeURIComponent(lastId)}`);
    notificationSource.addEventListener('notification', ev => {
      try {
        const item = JSON.parse(ev.data);
        if (!state.data.notifications.some(n => n.id === item.id)) {
          state.data.notifications.unshift(item);
          updateNotificationBadge();
          if (state.currentTab === 'profile') renderProfile();
        }
      } catch (_err) {}
    });
    notificationSource.onerror = () => {
      if (notificationSource) notificationSource.close();
      notificationSource = null;
      setTimeout(() => {
        if (state.data) connectNotificationStream();
      }, 3000);
    };
  }

  function rerender() {
    cacheSet('tasks_cache', state.tasks);
    renderInbox();
    renderToday();
    renderSearch();
    renderProfile();
    updateNotificationBadge();
    if (state.currentTab === 'projects') renderProjects();

  function switchTab(tab) {
    state.currentTab = tab;
    cacheSet('ui_current_tab', tab);
    document.getElementById('title').textContent = tab[0].toUpperCase() + tab.slice(1);
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    ['inbox','today','projects','search','profile'].forEach(v => {
      document.getElementById('view-' + v).classList.toggle('hidden', v !== tab);

  async function loadTasks(view = '') {
    const ws = state.data.workspaces[0];
    const res = await api(`/api/tasks?workspace_id=${ws.id}&limit=${state.pageSize}&offset=${state.page * state.pageSize}${view ? '&view=' + view : ''}`);
    state.tasks = res.items;
    cacheSet('tasks_cache', state.tasks);
  }

  async function addTask(title) {
    const ws = state.data.workspaces[0];
    const projectId = state.currentTab === 'projects' ? state.selectedProjectId : null;
    const optimistic = {
      id: (crypto.randomUUID ? crypto.randomUUID() : `tmp-${Date.now()}`),
      workspace_id: ws.id,
      title,
      status: 'To do',
      priority: 'Med',
      labels: [],
      archived: false,
      due_date: null,
      project_id: projectId,
      description: '',
    };
    state.tasks.unshift(optimistic);
    rerender();
    try {
      const created = await api('/api/tasks', 'POST', { title, workspace_id: ws.id, project_id: projectId });
      state.tasks = state.tasks.filter(t => t.id !== optimistic.id);
      state.tasks.unshift(created);
      rerender();
    } catch (e) {
      state.tasks = state.tasks.filter(t => t.id !== optimistic.id);
      rerender();
      alert('Failed to add task.');
    }
  }

  async function completeTask(ev, id) {
    if (ev) {
      ev.preventDefault();
      ev.stopPropagation();
    }
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    if (t.status === 'Done' || t.archived) return;
    const prev = t.status;
    t.status = 'Done';
    rerender();
    try {
      await api(`/api/tasks/${id}/complete`, 'POST');
      await loadTasks();
      rerender();
    } catch (e) {
      t.status = prev;
      rerender();
      alert('Complete nije uspio');
    }
  }

  async function reopenTask(ev, id) {
    if (ev) {
      ev.preventDefault();
      ev.stopPropagation();
    }
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    if (t.status !== 'Done' || t.archived) return;
    const prev = t.status;
    t.status = 'To do';
    rerender();
    try {
      await api(`/api/tasks/${id}`, 'PATCH', { status: 'To do' });
      await loadTasks();
      rerender();
    } catch (e) {
      t.status = prev;
      rerender();
      alert('Reopen nije uspio');
    }
  }

  async function archiveTask(ev, id) {
    if (ev) {
      ev.preventDefault();
      ev.stopPropagation();
    }
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    const prev = t.archived;
    t.archived = true;
    rerender();
    try {
      await api(`/api/tasks/${id}/archive`, 'POST');
      await loadTasks();
      rerender();
    } catch (e) {
      t.archived = prev;
      rerender();
      alert('Archive nije uspio');
    }
  }

      <div class="row"><input id="commentInput" class="grow" placeholder="Komentar ili @mention" /><button class="icon-btn" title="Comment" aria-label="Add comment" onclick="postComment('${id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 4z"/></svg></button></div>

    document.getElementById('drawer').classList.remove('open');

  async function saveTask(id) {
    const description = document.getElementById('taskDesc').value;
    const status = document.getElementById('taskStatus').value;
    const due = document.getElementById('taskDue').value;
    const projectValue = document.getElementById('taskProject')?.value ?? '';
    await api(`/api/tasks/${id}`, 'PATCH', {
      description,
      status,
      due_date: due ? new Date(due).toISOString() : null,
      project_id: projectValue || null
    });
    await loadTasks();
    rerender();
    closeDrawer();

  async function postComment(id) {

    await api(`/api/tasks/${id}/comments`, 'POST', { body });
    openTask(id);

  function setSearch(k, v) {
    state.search[k] = v;

  function toggleProjectView() { state.projectView = state.projectView === 'list' ? 'kanban' : 'list'; renderProjects(); }
  function selectProject(projectId) { state.selectedProjectId = projectId; renderProjects(); }
  function setKanbanStatus(status, smooth = true) {
    state.activeKanbanStatus = status;
    const pager = document.getElementById('kanbanPager');
    if (!pager) return;
    const lane = Array.from(pager.querySelectorAll('.lane-page')).find(x => x.getAttribute('data-lane-status') === status);
    if (!lane) return;
    lane.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', inline: 'start', block: 'nearest' });
    document.querySelectorAll('.kanban-tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-status') === status);
    });
  }
  function onKanbanScroll(event) {
    const pager = event.target;
    const lanes = Array.from(pager.querySelectorAll('.lane-page'));
    if (!lanes.length) return;
    const viewportCenter = pager.scrollLeft + pager.clientWidth / 2;
    let closest = lanes[0];
    let minDelta = Infinity;
    for (const lane of lanes) {
      const laneCenter = lane.offsetLeft + lane.clientWidth / 2;
      const delta = Math.abs(viewportCenter - laneCenter);
      if (delta < minDelta) {
        minDelta = delta;
        closest = lane;
      }
    }
    const status = closest.getAttribute('data-lane-status');
    if (!status || status === state.activeKanbanStatus) return;
    state.activeKanbanStatus = status;
    document.querySelectorAll('.kanban-tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-status') === status);
    });
  }

    const statuses = pager ? Array.from(pager.querySelectorAll('.lane-page')).map(x => x.getAttribute('data-lane-status')).filter(Boolean) : [];
    state.moveTaskId = taskId;
    state.moveStatuses = statuses;

      <p class="meta">Current: ${currentStatus}</p>
      <div class="card">

      <div class="sticky-actions"><button class="icon-btn" onclick="closeDrawer()"><svg class="ic" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></button></div>

    const ws = state.data.workspaces[0];
    const input = document.getElementById('newProjectName');
    const name = (input?.value || '').trim();
    if (!name) return;
    try {
      const project = await api('/api/projects', 'POST', { workspace_id: ws.id, name });
      state.data.projects.unshift(project);
      state.selectedProjectId = project.id;
      if (input) input.value = '';
      renderProjects();
    } catch (e) {
      alert('Kreiranje projekta nije uspjelo');
    }
  }

  async function deleteSelectedProject() {
    const project = state.data.projects.find(p => p.id === state.selectedProjectId);
    if (!project) return;
    const ok = confirm(`Delete project "${project.name}"? Tasks will be moved to Inbox.`);
    if (!ok) return;
    try {
      await api(`/api/projects/${project.id}`, 'DELETE');
      state.data.projects = state.data.projects.filter(p => p.id !== project.id);
      state.selectedProjectId = state.data.projects[0]?.id || null;
      await loadTasks();
      renderProjects();
      if (!state.selectedProjectId) switchTab('inbox');
    } catch (e) {
      alert('Brisanje projekta nije uspjelo');

  async function init() {
    try {
      state.data = await api('/api/bootstrap');
      state.currentUserId = String(state.data.current_user?.id || state.currentUserId || '');
      cacheSet('ui_user_id', state.currentUserId);
      const localTheme = cacheGet('ui_theme', null);
      if (localTheme === 'light' || localTheme === 'dark') {
        state.data.current_user.theme = localTheme;
      } else {
        cacheSet('ui_theme', state.data.current_user.theme || 'light');
      }
      const localContrast = cacheGet('ui_contrast', 'normal');
      state.contrast = localContrast === 'high' ? 'high' : 'normal';
      document.documentElement.setAttribute('data-contrast', state.contrast);
      state.selectedProjectId = state.data.projects[0]?.id || null;
      await loadTasks();
      rerender();
      switchTab(state.currentTab);
      connectNotificationStream();
    } catch (e) {
      document.body.innerHTML = '<h3 style="padding:20px">Failed to load app</h3>';
    }
  }

  init();
</script>
</body>
</html>
