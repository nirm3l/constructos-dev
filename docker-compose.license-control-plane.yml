services:
  license-control-plane:
    build: ./license_control_plane
    container_name: license-control-plane
    environment:
      LCP_DATABASE_URL: "${LCP_DATABASE_URL:-sqlite:////data/license-control-plane.db}"
      LCP_API_TOKEN: "${LCP_API_TOKEN:-dev-license-token}"
      LCP_TRIAL_DAYS: "${LICENSE_TRIAL_DAYS:-7}"
      LCP_DEFAULT_MAX_INSTALLATIONS: "${LCP_DEFAULT_MAX_INSTALLATIONS:-3}"
      LCP_TOKEN_TTL_SECONDS: "${LCP_TOKEN_TTL_SECONDS:-3600}"
      LCP_SIGNING_PRIVATE_KEY_PEM: "${LCP_SIGNING_PRIVATE_KEY_PEM:-}"
      LCP_SIGNING_KEY_ID: "${LCP_SIGNING_KEY_ID:-default-ed25519}"
      LCP_REQUIRE_SIGNED_TOKENS: "${LCP_REQUIRE_SIGNED_TOKENS:-false}"
      LCP_CLIENT_TOKEN_BUNDLE_PASSWORD: "${LCP_CLIENT_TOKEN_BUNDLE_PASSWORD:-${APP_BUNDLE_PASSWORD:-}}"
      LCP_CLIENT_TOKEN_DELIMITER: "${LCP_CLIENT_TOKEN_DELIMITER:-.}"
      LCP_CLIENT_TOKEN_BUNDLE_SEGMENT_INDEX: "${LCP_CLIENT_TOKEN_BUNDLE_SEGMENT_INDEX:-2}"
      LCP_EMAIL_RESEND_API_KEY: "${LCP_EMAIL_RESEND_API_KEY:-}"
      LCP_EMAIL_FROM: "${LCP_EMAIL_FROM:-}"
      LCP_EMAIL_REPLY_TO: "${LCP_EMAIL_REPLY_TO:-}"
      LCP_EMAIL_REQUEST_TIMEOUT_SECONDS: "${LCP_EMAIL_REQUEST_TIMEOUT_SECONDS:-10}"
      LCP_CUSTOMER_REF_SECRET: "${LCP_CUSTOMER_REF_SECRET:-}"
      LCP_CUSTOMER_REF_PREFIX: "${LCP_CUSTOMER_REF_PREFIX:-cust}"
      LCP_CUSTOMER_REF_LENGTH: "${LCP_CUSTOMER_REF_LENGTH:-20}"
      LCP_ONBOARDING_IMAGE_TAG: "${LCP_ONBOARDING_IMAGE_TAG:-main}"
      LCP_ONBOARDING_INSTALL_SCRIPT_URL: "${LCP_ONBOARDING_INSTALL_SCRIPT_URL:-https://raw.githubusercontent.com/nirm3l/constructos/main/install.sh}"
      LCP_ONBOARDING_SUPPORT_EMAIL: "${LCP_ONBOARDING_SUPPORT_EMAIL:-support@constructos.dev}"
      LCP_PUBLIC_BETA_FREE_UNTIL: "${LCP_PUBLIC_BETA_FREE_UNTIL:-2026-03-31T23:59:59Z}"
      LCP_CORS_ORIGINS: "${LCP_CORS_ORIGINS:-http://localhost:8082,http://127.0.0.1:8082,https://constructos.dev,https://www.constructos.dev}"
    ports:
      - "8092:8092"
    volumes:
      - license-control-plane-data:/data
    restart: unless-stopped

volumes:
  license-control-plane-data:
