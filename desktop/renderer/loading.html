<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConstructOS Desktop</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Avenir Next", sans-serif;
        background: radial-gradient(circle at top, #12243d, #070b12 60%);
        color: #d7e6ff;
      }
      .panel {
        width: min(640px, calc(100vw - 48px));
        border: 1px solid #28456d;
        border-radius: 14px;
        background: rgba(12, 21, 34, 0.86);
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      .title {
        margin: 0 0 8px 0;
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        margin: 0;
        color: #a9c2e8;
        line-height: 1.5;
      }
      .endpoint {
        margin-top: 18px;
        font-size: 13px;
        color: #88a8d6;
        word-break: break-all;
      }
      .loader {
        margin-top: 22px;
        width: 24px;
        aspect-ratio: 1;
        border-radius: 50%;
        border: 3px solid #3f5d8c;
        border-top-color: #9ec4ff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1 class="title">Launching ConstructOS</h1>
      <p class="subtitle">Waiting for the application backend to become available.</p>
      <div id="endpoint" class="endpoint"></div>
      <div class="loader" aria-hidden="true"></div>
    </section>
    <script>
      const params = new URLSearchParams(window.location.search);
      const endpoint = params.get("appUrl") || "";
      const endpointEl = document.getElementById("endpoint");
      if (endpoint && endpointEl) {
        endpointEl.textContent = `Target: ${endpoint}`;
      }
    </script>
  </body>
</html>
