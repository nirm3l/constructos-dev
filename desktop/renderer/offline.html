<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConstructOS Desktop</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Avenir Next", sans-serif;
        background: radial-gradient(circle at top, #2a1313, #0a0d13 55%);
        color: #f5f7ff;
      }
      .panel {
        width: min(760px, calc(100vw - 48px));
        border: 1px solid #5f2d2d;
        border-radius: 14px;
        background: rgba(26, 12, 12, 0.9);
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #e6c9c9;
        line-height: 1.55;
      }
      .details {
        margin-top: 18px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(95, 45, 45, 0.22);
        border: 1px solid rgba(170, 80, 80, 0.35);
        font-size: 13px;
        line-height: 1.5;
        color: #ffdede;
        word-break: break-all;
      }
      .endpoint-editor {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(170, 80, 80, 0.35);
        background: rgba(44, 16, 16, 0.44);
      }
      .endpoint-editor label {
        display: block;
        margin: 0 0 6px 0;
        font-size: 12px;
        color: #ffcece;
      }
      .endpoint-editor input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #8f4d4d;
        border-radius: 8px;
        padding: 9px 10px;
        margin-bottom: 10px;
        background: #220f0f;
        color: #ffe5e5;
        font-size: 13px;
      }
      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        border: 1px solid #ab5959;
        border-radius: 8px;
        padding: 10px 14px;
        background: #4b2020;
        color: #ffdede;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #5b2727;
      }
      button.primary {
        border-color: #67a2ff;
        background: #193f74;
        color: #dbe9ff;
      }
      button.primary:hover {
        background: #255196;
      }
      .hint {
        margin-top: 18px;
        font-size: 13px;
        color: #e4b7b7;
      }
      .status {
        margin-top: 14px;
        min-height: 20px;
        font-size: 13px;
        color: #f2cdb6;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Backend not reachable</h1>
      <p>ConstructOS Desktop could not connect to your app backend within the startup timeout.</p>
      <div class="details">
        <div id="target"></div>
        <div id="health"></div>
        <div id="timeout"></div>
        <div id="statusCode"></div>
      </div>
      <div class="endpoint-editor">
        <label for="appUrlInput">App URL</label>
        <input id="appUrlInput" type="text" placeholder="http://127.0.0.1:8080" />
        <label for="healthUrlInput">Health URL (optional)</label>
        <input id="healthUrlInput" type="text" placeholder="Leave empty to use App URL + /api/health" />
        <button id="saveRetryButton" class="primary" type="button">Save Endpoint + Retry</button>
      </div>
      <div class="actions">
        <button id="retryButton" class="primary" type="button">Retry Connection</button>
        <button id="openSettingsButton" type="button">Open Settings Window</button>
        <button id="openBrowserButton" type="button">Open URL In Browser</button>
        <button id="quitButton" type="button">Quit</button>
      </div>
      <div class="status" id="status"></div>
      <p class="hint">
        If your local stack is not running, start it first with <code>./scripts/deploy.sh</code>, then retry.
      </p>
    </section>
    <script>
      const params = new URLSearchParams(window.location.search);
      const statusEl = document.getElementById("status");
      const appUrlInput = document.getElementById("appUrlInput");
      const healthUrlInput = document.getElementById("healthUrlInput");

      function setText(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = value;
      }

      function setStatus(text) {
        if (!statusEl) return;
        statusEl.textContent = text;
      }

      setText("target", `App URL: ${params.get("appUrl") || "n/a"}`);
      setText("health", `Health URL: ${params.get("healthUrl") || "n/a"}`);
      setText("timeout", `Startup timeout: ${params.get("startupTimeoutMs") || "n/a"} ms`);
      setText("statusCode", `Last status code: ${params.get("statusCode") || "n/a"}`);

      if (appUrlInput) appUrlInput.value = params.get("appUrl") || "";
      const defaultHealth = `${String(params.get("appUrl") || "").replace(/\/$/, "")}/api/health`;
      if (healthUrlInput) {
        const currentHealth = params.get("healthUrl") || "";
        healthUrlInput.value = currentHealth === defaultHealth ? "" : currentHealth;
      }

      document.getElementById("retryButton")?.addEventListener("click", async () => {
        setStatus("Retrying connection...");
        try {
          await window.constructosDesktop.retryConnection();
        } catch {
          setStatus("Retry failed. Check backend logs and try again.");
        }
      });

      document.getElementById("saveRetryButton")?.addEventListener("click", async () => {
        const appUrl = String(appUrlInput?.value || "").trim();
        const healthUrl = String(healthUrlInput?.value || "").trim();
        setStatus("Saving endpoint and retrying...");
        try {
          await window.constructosDesktop.updateEndpoint({
            appUrl,
            healthUrl,
          });
        } catch (error) {
          const message = error?.message ? String(error.message) : "Failed to save endpoint.";
          setStatus(message);
        }
      });

      document.getElementById("openSettingsButton")?.addEventListener("click", async () => {
        try {
          await window.constructosDesktop.openSettings();
        } catch {
          setStatus("Could not open settings window.");
        }
      });

      document.getElementById("openBrowserButton")?.addEventListener("click", async () => {
        try {
          await window.constructosDesktop.openInBrowser();
          setStatus("Opened app URL in your default browser.");
        } catch {
          setStatus("Failed to open browser.");
        }
      });

      document.getElementById("quitButton")?.addEventListener("click", async () => {
        try {
          await window.constructosDesktop.quit();
        } catch {
          setStatus("Could not quit application.");
        }
      });
    </script>
  </body>
</html>
