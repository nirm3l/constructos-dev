<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConstructOS Connection Settings</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Avenir Next", sans-serif;
        background: linear-gradient(165deg, #0d1727 0%, #121925 100%);
        color: #e7f0ff;
      }
      main {
        width: min(540px, calc(100vw - 40px));
        margin: 24px auto;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
      }
      p {
        margin: 0 0 20px 0;
        color: #b6c9e8;
        line-height: 1.5;
      }
      .card {
        border: 1px solid #2c4368;
        border-radius: 12px;
        background: rgba(11, 20, 33, 0.9);
        padding: 16px;
      }
      label {
        display: block;
        margin: 0 0 6px 0;
        font-size: 13px;
        color: #9fbae3;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #35527d;
        border-radius: 8px;
        background: #0a1423;
        color: #e7f0ff;
        padding: 10px 12px;
        margin-bottom: 14px;
        font-size: 14px;
      }
      .hint {
        margin: -8px 0 14px 0;
        font-size: 12px;
        color: #88a8d6;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      button {
        border: 1px solid #35527d;
        border-radius: 8px;
        padding: 10px 14px;
        background: #10243f;
        color: #d9e7ff;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        border-color: #5d95ec;
        background: #1d4e96;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 13px;
        color: #ffcf97;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connection Settings</h1>
      <p>Configure where ConstructOS Desktop connects for UI + API.</p>
      <section class="card">
        <label for="appUrl">App URL</label>
        <input id="appUrl" type="text" placeholder="http://127.0.0.1:8080" />
        <label for="healthUrl">Health URL (optional)</label>
        <input id="healthUrl" type="text" placeholder="Leave empty to use App URL + /api/health" />
        <div class="hint">Expected protocol: <code>http://</code> or <code>https://</code></div>
        <div class="actions">
          <button id="saveButton" class="primary" type="button">Save And Reconnect</button>
          <button id="cancelButton" type="button">Cancel</button>
        </div>
        <div id="status" class="status"></div>
      </section>
    </main>
    <script>
      const appUrlInput = document.getElementById("appUrl");
      const healthUrlInput = document.getElementById("healthUrl");
      const statusEl = document.getElementById("status");

      function setStatus(text) {
        if (!statusEl) return;
        statusEl.textContent = text || "";
      }

      async function init() {
        try {
          const config = await window.constructosDesktop.getRuntimeConfig();
          if (appUrlInput) appUrlInput.value = String(config?.appUrl || "");
          if (healthUrlInput) {
            const defaultHealth = `${String(config?.appUrl || "").replace(/\/$/, "")}/api/health`;
            const currentHealth = String(config?.healthUrl || "");
            healthUrlInput.value = currentHealth === defaultHealth ? "" : currentHealth;
          }
        } catch {
          setStatus("Failed to load current settings.");
        }
      }

      document.getElementById("saveButton")?.addEventListener("click", async () => {
        const appUrl = String(appUrlInput?.value || "").trim();
        const healthUrl = String(healthUrlInput?.value || "").trim();
        setStatus("Saving...");
        try {
          await window.constructosDesktop.updateEndpoint({
            appUrl,
            healthUrl,
          });
          setStatus("Saved. Reconnecting...");
          window.close();
        } catch (error) {
          const message = error?.message ? String(error.message) : "Failed to save settings.";
          setStatus(message);
        }
      });

      document.getElementById("cancelButton")?.addEventListener("click", () => {
        window.close();
      });

      void init();
    </script>
  </body>
</html>
