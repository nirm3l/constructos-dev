name: Release Images

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - image_suffix: task-app
          - image_suffix: mcp-tools
    env:
      IMAGE_PREFIX: constructos
      IMAGE_SOURCE_REPO: nirm3l/constructos-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "${BASE_VERSION}" ]]; then
            BASE_VERSION="dev"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            APP_VERSION="${GITHUB_REF_NAME}"
          else
            APP_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          APP_BUILD="ghcr-${APP_VERSION}-${SHORT_SHA}"
          {
            echo "app_version=${APP_VERSION}"
            echo "app_build=${APP_BUILD}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=${{ steps.release_meta.outputs.app_version }}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_SOURCE_REPO }}
            org.opencontainers.image.url=https://github.com/${{ env.IMAGE_SOURCE_REPO }}
            org.opencontainers.image.documentation=https://github.com/${{ env.IMAGE_SOURCE_REPO }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.release_meta.outputs.app_version }}
            APP_BUILD=${{ steps.release_meta.outputs.app_build }}
          provenance: true
          sbom: true
