name: Desktop Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish in nirm3l/constructos (for example desktop-v0.1.3)"
        required: false
        type: string
      publish_release:
        description: "Publish release assets after build"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Verify macOS signing and notarization secrets
        if: runner.os == 'macOS' && inputs.publish_release == true && (startsWith(github.ref, 'refs/tags/desktop-v') || inputs.release_tag != '')
        env:
          DESKTOP_CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          DESKTOP_CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          DESKTOP_APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          DESKTOP_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_SPECIFIC_PASSWORD }}
          DESKTOP_APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          DESKTOP_APPLE_API_KEY: ${{ secrets.DESKTOP_APPLE_API_KEY }}
          DESKTOP_APPLE_API_KEY_ID: ${{ secrets.DESKTOP_APPLE_API_KEY_ID }}
          DESKTOP_APPLE_API_ISSUER: ${{ secrets.DESKTOP_APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [[ -z "${DESKTOP_CSC_LINK:-}" || -z "${DESKTOP_CSC_KEY_PASSWORD:-}" ]]; then
            echo "::error::Missing macOS signing secrets: DESKTOP_CSC_LINK and/or DESKTOP_CSC_KEY_PASSWORD."
            exit 1
          fi

          has_api_key="false"
          has_apple_id="false"
          if [[ -n "${DESKTOP_APPLE_API_KEY:-}" && -n "${DESKTOP_APPLE_API_KEY_ID:-}" && -n "${DESKTOP_APPLE_API_ISSUER:-}" ]]; then
            has_api_key="true"
          fi
          if [[ -n "${DESKTOP_APPLE_ID:-}" && -n "${DESKTOP_APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${DESKTOP_APPLE_TEAM_ID:-}" ]]; then
            has_apple_id="true"
          fi
          if [[ "${has_api_key}" != "true" && "${has_apple_id}" != "true" ]]; then
            echo "::error::Missing notarization secrets. Provide either Apple API key triplet (DESKTOP_APPLE_API_KEY, DESKTOP_APPLE_API_KEY_ID, DESKTOP_APPLE_API_ISSUER) or Apple ID triplet (DESKTOP_APPLE_ID, DESKTOP_APPLE_APP_SPECIFIC_PASSWORD, DESKTOP_APPLE_TEAM_ID)."
            exit 1
          fi

      - name: Build desktop installers
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.DESKTOP_CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.DESKTOP_WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.DESKTOP_APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.DESKTOP_APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.DESKTOP_APPLE_API_ISSUER }}
          DESKTOP_REQUIRE_NOTARIZATION: ${{ runner.os == 'macOS' && inputs.publish_release == true && (startsWith(github.ref, 'refs/tags/desktop-v') || inputs.release_tag != '') }}
        run: npm run dist:ci

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.tar.gz
            desktop/release/*.blockmap
            desktop/release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: needs.build.result == 'success' && inputs.publish_release == true && (startsWith(github.ref, 'refs/tags/desktop-v') || inputs.release_tag != '')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if [[ -z "$tag" ]]; then
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              tag="${GITHUB_REF#refs/tags/}"
            fi
          fi
          if [[ -z "$tag" ]]; then
            echo "::error::No release tag resolved. Pass workflow input release_tag (desktop-v*)."
            exit 1
          fi
          if [[ ! "$tag" =~ ^desktop-v ]]; then
            echo "::error::Release tag must start with desktop-v (got: $tag)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify ConstructOS release token
        shell: bash
        env:
          CONSTRUCTOS_RELEASE_TOKEN: ${{ secrets.CONSTRUCTOS_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CONSTRUCTOS_RELEASE_TOKEN:-}" ]]; then
            echo "::error::Missing secret CONSTRUCTOS_RELEASE_TOKEN for cross-repo release publishing."
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          repository: nirm3l/constructos
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: main
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
            release-assets/**/*.blockmap
            release-assets/**/latest*.yml
          generate_release_notes: true
          token: ${{ secrets.CONSTRUCTOS_RELEASE_TOKEN }}
