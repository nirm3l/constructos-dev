name: Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "desktop-v*"
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "desktop/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "desktop/**"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop installers
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.DESKTOP_CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.DESKTOP_WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
        run: npm run dist

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: desktop/release/**/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
