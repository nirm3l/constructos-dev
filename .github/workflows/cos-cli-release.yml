name: COS CLI Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLIC_RELEASE_REPO: nirm3l/constructos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tooling
        run: python -m pip install --upgrade pip pytest build twine typer

      - name: Run COS unit tests
        run: pytest -q tools/cos/tests/test_main.py

      - name: Build COS package artifacts
        run: ./tools/cos/scripts/build.sh

      - name: List built package artifacts
        run: ls -lah tools/cos/dist

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.CONSTRUCTOS_RELEASE_TOKEN }}
        with:
          repository: ${{ env.PUBLIC_RELEASE_REPO }}
          files: tools/cos/dist/*
