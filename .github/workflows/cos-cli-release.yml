name: COS CLI Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PUBLIC_RELEASE_REPO: nirm3l/constructos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tooling
        run: python -m pip install --upgrade pip pytest build twine typer

      - name: Run COS unit tests (if present)
        run: |
          if [[ -f tools/cos/tests/test_main.py ]]; then
            pytest -q tools/cos/tests/test_main.py
          else
            echo "No COS unit tests found at tools/cos/tests/test_main.py; skipping."
          fi

      - name: Build COS package artifacts
        run: ./tools/cos/scripts/build.sh

      - name: List built package artifacts
        run: ls -lah tools/cos/dist

      - name: Resolve COS release version
        id: cos_meta
        shell: bash
        run: |
          set -euo pipefail
          COS_VERSION="$(python - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("tools/cos/pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', text)
          if not match:
              raise SystemExit("Unable to resolve COS version from tools/cos/pyproject.toml")
          print(match.group(1))
          PY
          )"
          echo "version=${COS_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.CONSTRUCTOS_RELEASE_TOKEN }}
          repository: ${{ env.PUBLIC_RELEASE_REPO }}
          tag_name: cos-v${{ steps.cos_meta.outputs.version }}
          target_commitish: main
          name: COS CLI v${{ steps.cos_meta.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: tools/cos/dist/*
