name: CQRS Guardrails

on:
  workflow_dispatch:

jobs:
  cqrs-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CQRS guardrail check
        run: python scripts/check_cqrs_guardrails.py
